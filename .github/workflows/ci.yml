name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - lilygo-t-display-s3
          - lilygo-t-qt-pro

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          fetch-depth: 1

      - name: Checkout fallback (retry)
        if: steps.checkout.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          for attempt in 1 2 3; do
            echo "Checkout fallback attempt ${attempt}/3"
            if git fetch --depth=1 origin "${{ github.sha }}" && git checkout --force FETCH_HEAD; then
              git remote set-url origin "https://github.com/${{ github.repository }}.git"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Transient checkout failure, retrying in 20s..."
              sleep 20
            fi
          done

          echo "::error::Checkout failed after 3 fallback attempts"
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}/3 for ${{ matrix.environment }}"
            if pio run -e ${{ matrix.environment }}; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Transient build failure, retrying in 20s..."
              sleep 20
            fi
          done

          echo "::error::Build failed after 3 attempts"
          exit 1

      - name: Check flash budget (lilygo-t-qt-pro)
        if: matrix.environment == 'lilygo-t-qt-pro'
        shell: bash
        run: |
          set -euo pipefail

          WARN_PERCENT=75
          FAIL_PERCENT=80

          SIZE_OUTPUT="$(pio run -e ${{ matrix.environment }})"
          echo "$SIZE_OUTPUT"

          SIZE_LINE="$(echo "$SIZE_OUTPUT" | grep -Eo 'used [0-9]+ bytes from [0-9]+ bytes' | tail -n 1 || true)"
          if [ -z "$SIZE_LINE" ]; then
            echo "::error::Cannot parse flash size from PlatformIO output"
            exit 1
          fi

          USED_BYTES="$(echo "$SIZE_LINE" | awk '{print $2}')"
          TOTAL_BYTES="$(echo "$SIZE_LINE" | awk '{print $5}')"

          PERCENT="$(python -c "used=int('$USED_BYTES'); total=int('$TOTAL_BYTES'); print((used * 100.0) / total)")"

          echo "Flash usage: ${USED_BYTES}/${TOTAL_BYTES} bytes (${PERCENT}%)"

          if python -c "import sys; percent=float('$PERCENT'); threshold=float('$FAIL_PERCENT'); sys.exit(1 if percent > threshold else 0)"
          then
            :
          else
            echo "::error::Flash usage ${PERCENT}% exceeds fail threshold ${FAIL_PERCENT}%"
            exit 1
          fi

          if python -c "import sys; percent=float('$PERCENT'); threshold=float('$WARN_PERCENT'); sys.exit(1 if percent > threshold else 0)"
          then
            :
          else
            echo "::warning::Flash usage ${PERCENT}% exceeds warning threshold ${WARN_PERCENT}%"
          fi
